<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="titulo">Sistema de Busca de Filmes</h1>
    <div id="blocoBusca">
    <label id = "Texto" class="parteBusca" for="busca">Buscar Filme</label>
    <input  type="text" id="busca" class="parteBusca" placeholder="Ex:Ben 10">
    <button id="button" class="parteBusca">Buscar</button>
    </div>
    <div class="resultado" id="blocoFilme"></div>


    <script>
        const apikey = "f77bfada";

        button.addEventListener("click" , ()=>{
            let stringBusca = document.getElementById("busca").value;

            fetch(`http://www.omdbapi.com/?apikey=${apikey}&s=${stringBusca}&plot=full`).then((result)=>{
                return result.json();
            }).then((data) => {
                console.log(data);
                const filmes = data.Search;
                exibirFilmes(filmes);
            })
        
        })

        function exibirFilmes(filmes){
            let htmlfilme="";
            filmes.forEach(filmes => {
                htmlfilme += `<div class="filme">
                    <h2>${filmes.Title}<\h2>
                    <img width = 200px  height =  100px src="${filmes.Poster}" alt=${filmes.Title}>
                    <p>${ filmes.Year}</p>
                    </div>    
                    `
            });

            divResultado = document.querySelector(".resultado");
            divResultado.innerHTML = htmlfilme;
        }
    </script>
</body>
</html>
