<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>

    <label for="busca">Busca</label>
    <input type="text" id="busca">
    <button id="button">Buscar</button>
    <div class="resultado"></div>


    <script>
        const apikey = "f77bfada";

        button.addEventListener("click" , ()=>{
            let stringBusca = document.getElementById("busca").value;

            fetch(`http://www.omdbapi.com/?apikey=${apikey}&s=${stringBusca}`).then((result)=>{
                return result.json();
            }).then((data) => {
                console.log(data);
                const filmes = data.Search;
                exibirFilmes(filmes);
            })
        
        })

        function exibirFilmes(filmes){
            let htmlfilme="";
            filmes.forEach(filmes => {
                htmlfilme += `<div class="filme">
                    <h2>${filmes.Title}<\h2>
                    <img src="${filmes.Poster}" alt=${filmes.Title}>
                    <p>${ filmes.Year}</p>
                    </div>    
                    `
            });

            divResultado = document.querySelector(".resultado");
            divResultado.innerHTML = htmlfilme;
        }
    </script>
</body>
</html>
